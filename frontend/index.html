<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BroomBuster</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BroomBuster">
  <meta name="theme-color" content="#2563eb">

  <script src="/config.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.css">
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pmtiles@3/dist/pmtiles.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══════════════════ AUTH SCREEN ══════════════════ -->
<div id="auth-screen">
  <h1>🧹 BroomBuster</h1>
  <p class="tagline">Know before the grim sweeper comes.</p>
  <div class="card">
    <h2>Sign in</h2>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <div id="auth-error"></div>
    <button id="btn-login">Sign in</button>
    <button class="btn-ghost" id="btn-signup">Create account</button>
  </div>
</div>

<!-- ══════════════════ APP SCREEN ══════════════════ -->
<div id="app-screen">
  <div id="topbar">
    <span class="app-title">🧹 BroomBuster</span>
    <span class="tb-sep"></span>
    <select id="region-select" class="tb-select"></select>
    <span class="tb-sep"></span>
    <span id="status-text" class="idle">—</span>
    <span id="locate-info"></span>
    <button id="btn-locate" class="tb-btn" title="Use GPS location">📍</button>
    <span class="tb-sep"></span>
    <button id="btn-dark-mode" class="tb-btn" title="Toggle dark mode">🌙</button>
    <button id="btn-logout" class="tb-btn">Sign out</button>
  </div>
  <div id="map-container">
    <div id="map"></div>

    <!-- Floating pill shown during tap-to-place mode -->
    <div id="place-banner">
      📍 Tap the map to place your car
      <button id="btn-cancel-place">Cancel</button>
    </div>

    <!-- Right-click context menu -->
    <div id="ctx-menu">
      <div class="ctx-item" id="ctx-add-car">+ Add car here</div>
    </div>

    <!-- Persistent cars info panel (top-right) -->
    <div id="cars-panel">
      <div id="map-legend" class="cars-legend">
        <span style="color:#ef4444">■ Today</span>
        <span style="color:#f97316">■ Tomorrow</span>
        <span style="color:#2563eb">■ Clear</span>
      </div>
    </div>

    <!-- GPS "you are here" pin popup -->
    <div id="gps-pin-popup">
      <button id="btn-gps-add">📍 Add car here</button>
      <button id="btn-gps-close" class="popup-close inline-close" title="Close (Esc)" aria-label="Close">✕</button>
    </div>

    <!-- Snap chip: shown after /check resolves a segment -->
    <div id="snap-chip"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- ══════════════════ INLINE NAME PANEL ══════════════════ -->
<div id="name-panel">
  <div class="np-row">
    <input type="text" id="name-panel-input" placeholder="Car name…" maxlength="32">
    <button id="btn-np-save" title="Save" aria-label="Save">✓</button>
    <button id="btn-np-close" class="popup-close inline-close" title="Close (Esc)" aria-label="Close">✕</button>
  </div>
</div>

<!-- ══════════════════ CUSTOM HOVER ══════════════════ -->
<div id="custom-hover"></div>

<script src="js/urgency.js"></script>
<script src="js/app.js"></script>
</body>
</html>
